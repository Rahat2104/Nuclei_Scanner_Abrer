id: security-txt-check

info:
  name: Missing Security Contact File
  author: student
  severity: info
  description: This lightweight custom template checks whether the website is missing a /.well-known/security.txt file.

http:
  - method: GET
    path:
      - "{{BaseURL}}/.well-known/security.txt"

    matchers:
      - type: dsl
        dsl:
          - "status_code == 404 || status_code == 403"
