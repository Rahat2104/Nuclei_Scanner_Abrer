id: basic-http-check

info:
  name: Website Response Check
  author: student
  severity: info
  description: This lightweight custom template checks whether the target website responds successfully.

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers:
      - type: dsl
        dsl:
          - "status_code >= 200 && status_code < 500"
